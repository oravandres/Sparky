---
# Structured JSON logging for Sparky services — see PLAN.md §19.
# Consumed by python-json-logger via dictConfig in services/*/main.py.

version: 1
disable_existing_loggers: false

formatters:
  json:
    "()": pythonjsonlogger.jsonlogger.JsonFormatter
    format: "%(asctime)s %(name)s %(levelname)s %(message)s"
    rename_fields:
      asctime: ts
      levelname: level
      name: logger
    json_ensure_ascii: false

filters:
  redact:
    "()": sparky_common.logging_filters.RedactSecretsFilter

handlers:
  stdout:
    class: logging.StreamHandler
    stream: ext://sys.stdout
    formatter: json
    filters: [redact]
    level: DEBUG

  file:
    class: logging.handlers.WatchedFileHandler
    filename: /var/log/sparky/sparky-gateway/sparky-gateway.log
    formatter: json
    filters: [redact]
    level: INFO

root:
  level: INFO
  handlers: [stdout]

loggers:
  sparky_gateway:
    level: INFO
    handlers: [stdout]
    propagate: false
  sparky_worker:
    level: INFO
    handlers: [stdout]
    propagate: false
  uvicorn.access:
    level: INFO
    handlers: [stdout]
    propagate: false
