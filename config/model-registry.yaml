---
# Sparky model registry — canonical mapping the gateway uses to resolve
# model IDs to runtimes. See PLAN.md §3 (approved matrix), §7.3 (schema),
# and §4.3 (co-residency / eviction policy).
#
# Rules (PLAN §3, §7.3, §25):
#   - "Latest" is resolved at install time and PINNED here as a `revision`
#     (HF commit SHA or tag). Updates are explicit PRs, never silent.
#   - Approved set only — no fallbacks (e.g. FLUX.1, SDXL, SD3.x, Whisper,
#     Kokoro, generic Ollama). Adding non-approved entries is rejected.
#   - The gateway exposes only `active: true` models at GET /v1/models and
#     emits the `state` field at runtime (hot|cold|loading|evicting).
#
# `revision` placeholders read "TBD-pin-at-install" until the operator
# resolves them on the host during Phase 4 (PLAN §13). CI will refuse
# to deploy a model whose `revision` is still TBD-* once enforcement
# lands in PR 6+.

version: 1

defaults:
  weights_root: /data/models
  cache_root: /data/cache
  outputs_root: /data/outputs

co_residency:
  # See PLAN §4.3. Tier A is always hot, Tier B is single-slot media,
  # Tier C is small (TTS/ASR) and may co-reside with media.
  vram_headroom_gb: 8
  default_eviction_idle_minutes: 15

models:
  # --- Tier A: premium text / reasoning (always hot) -----------------
  - id: nemotron-3-super-120b-a12b-nvfp4
    family: text
    role: premium-text
    tier: A
    hf_repo: nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4
    revision: TBD-pin-at-install
    runtime: vllm
    runtime_url: http://127.0.0.1:8000
    fallback_runtime: trtllm
    fallback_runtime_url: http://127.0.0.1:8001
    weights_path: /data/models/text/nemotron-3-super-120b-a12b-nvfp4
    approx_size_gb: 70
    vram_estimate_gb: 70
    priority: P0
    active: true
    co_resident: false
    eviction_idle_minutes: null

  # --- Tier B: image (single-slot, evictable) ------------------------
  - id: flux2-dev
    family: image
    role: premium-image
    tier: B
    hf_repo: black-forest-labs/FLUX.2-dev
