---
# Sparky Gateway compose unit — see PLAN.md §4.1 / §12.
# Run with the env file mirrored from MiMi-Secrets (or a dev copy).
# scripts/start-gateway.sh exports SPARKY_ENV_FILE so Compose substitutes the same path below.
#
#   docker compose --env-file /etc/sparky/sparky.env \
#       -f docker/compose/docker-compose.gateway.yml up -d
#
# Defaults for bind address, log level, and config paths come from the image Dockerfile (`ENV`).
# Set overrides (e.g. SPARKY_LOG_LEVEL=debug) only via keys in the env_file below — avoid a Compose
# `environment:` map here: Compose applies it after env_file and hard-coded literals override the file.
#
# The container typically listens on port 8080; the host firewall (PLAN §10) restricts LAN reachability.

services:
  sparky-gateway:
    image: ghcr.io/oravandres/sparky/sparky-gateway:latest
    build:
      # Build context is the repo root so the image can copy both
      # services/sparky-common and services/sparky-gateway.
      context: ../..
      dockerfile: services/sparky-gateway/Dockerfile
    container_name: sparky-gateway
    restart: unless-stopped
    env_file:
      # Honour SPARKY_ENV_FILE when exported (scripts/start-gateway.sh); default appliance path.
      - ${SPARKY_ENV_FILE:-/etc/sparky/sparky.env}
    volumes:
      - /opt/sparky/config:/opt/sparky/config:ro
      - /var/log/sparky/sparky-gateway:/var/log/sparky/sparky-gateway
    ports:
      - "8080:8080"
    logging:
      driver: journald
      options:
        tag: "sparky-gateway"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request,sys;
          sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/health',
          timeout=3).status==200 else 1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
