---
# pre-commit hooks — see PLAN.md §22
# Run locally: `pre-commit install && pre-commit run --all-files`

minimum_pre_commit_version: "3.5.0"

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
        exclude: ^.*\.md$
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-yaml
        args: ["--allow-multiple-documents"]
        exclude: ^config/api-contract\.yaml$
      - id: check-json
      - id: check-toml
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: ["--fix"]
        files: ^services/.*\.py$
      - id: ruff-format
        files: ^services/.*\.py$

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: ["-c", ".yamllint"]
        exclude: ^config/api-contract\.yaml$

  - repo: https://github.com/ansible/ansible-lint
    rev: v24.12.2
    hooks:
      - id: ansible-lint
        additional_dependencies:
          # Match .github/workflows/ci.yml so the hook env matches standalone ansible-lint.
          - ansible-core>=2.17,<2.19
        files: ^(playbooks|roles)/.*\.(ya?ml)$

  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.10.0
    hooks:
      - id: shellcheck
        args: ["-x"]
        # Vendored upstream (playbooks/files/README.md); CI only runs shellcheck on scripts/.
        exclude: ^playbooks/files/k3s-install-get-k3s-io\.sh$

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.14.0
    hooks:
      - id: markdownlint-cli2
        files: ^.*\.md$

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
