[defaults]
inventory = inventory/hosts.yml
# MiMi first when sibling repo exists; Sparky bundles roles/k3s_agent for standalone clones / CI.
roles_path = ../MiMi/roles:roles
collections_path = .ansible/collections:~/.ansible/collections:/usr/share/ansible/collections
host_key_checking = False
retry_files_enabled = False
gathering = smart
fact_caching = jsonfile
fact_caching_connection = .ansible_cache
fact_caching_timeout = 86400

# Performance optimizations
forks = 10
pipelining = True
timeout = 30

# Output
stdout_callback = default
callbacks_enabled = profile_tasks

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = True

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no
pipelining = True
