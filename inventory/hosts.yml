---
# Sparky Inventory
# NVIDIA DGX Spark — inventory host name `dgx-spark`, group `sparky` for group_vars/sparky.yml

all:
  children:
    # Host group for Ansible vars: inventory/group_vars/sparky.yml (PLAN §7.1)
    sparky:
      hosts:
        dgx-spark:
          ansible_connection: local

    # K3s Cluster Groups
    k3s_cluster:
      children:
        servers:
        agents:

    servers:
      hosts:
        pi-c1:
          ansible_host: pi-c1
          ansible_user: pi

    agents:
      hosts:
        dgx-spark:
          ansible_connection: local
